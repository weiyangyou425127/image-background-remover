<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PayPal 测试</title>
    <script src="https://www.paypal.com/sdk/js?client-id=Aeajzmpx8jJqRSS2iC-0MS4HaFP4_WkRUzUW_wjHgVr0L2_KUHLFOHMVAnPdDCbH5_ELsk7CNCGyL_-g&currency=USD"></script>
</head>
<body>
    <h1>PayPal SDK 测试</h1>
    <div id="status"></div>
    <div id="paypal-button-container"></div>
    <script>
        const status = document.getElementById('status');
        
        // 检查 PayPal SDK 是否加载
        if (typeof paypal === 'undefined') {
            status.innerHTML = '❌ PayPal SDK 未加载';
        } else {
            status.innerHTML = '✅ PayPal SDK 已加载';
            
            // 渲染按钮
            paypal.Buttons({
                createOrder: () => {
                    alert('创建订单');
                    return 'TEST_ORDER_ID';
                },
                onApprove: () => {
                    alert('支付成功');
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
