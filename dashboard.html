<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; }
        .container { max-width: 900px; margin: 50px auto; padding: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .user-info img { width: 60px; height: 60px; border-radius: 50%; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px; }
        .stat-num { font-size: 32px; font-weight: bold; color: #6c63ff; }
        .stat-label { font-size: 14px; color: #666; margin-top: 5px; }
        .buy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .buy-item { text-align: center; padding: 20px; border: 2px solid #eee; border-radius: 10px; }
        .price { font-size: 24px; font-weight: bold; color: #6c63ff; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 12px; background: #0070ba; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .buy-btn:hover { background: #005ea6; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="user-info"></div>
        <div id="stats"></div>
        <h3>购买积分包</h3>
        <div class="buy-grid">
            <div class="buy-item">
                <div>10 张</div>
                <div class="price">$3.9</div>
                <button class="buy-btn" onclick="buy('credits_10','3.90')">购买</button>
            </div>
            <div class="buy-item">
                <div>50 张</div>
                <div class="price">$14.9</div>
                <button class="buy-btn" onclick="buy('credits_50','14.90')">购买</button>
            </div>
            <div class="buy-item">
                <div>200 张</div>
                <div class="price">$49.9</div>
                <button class="buy-btn" onclick="buy('credits_200','49.90')">购买</button>
            </div>
        </div>
    </div>
</div>
<script>
const API = 'https://image-bg-auth.weiyangyou425127.workers.dev';
async function load() {
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/'; return; }
    const res = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) { window.location.href = '/'; return; }
    const user = await res.json();
    document.getElementById('user-info').innerHTML = `<img src="${user.picture}"><div><h2>${user.name}</h2><p>${user.email}</p></div>`;
    document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-num">${user.total_available}</div><div class="stat-label">总可用</div></div>
        <div class="stat"><div class="stat-num">${user.paid_credits}</div><div class="stat-label">付费积分</div></div>
        <div class="stat"><div class="stat-num">${user.total_processed}</div><div class="stat-label">已处理</div></div>
    `;
}
async function buy(pkg, amount) {
    const token = localStorage.getItem('auth_token');
    const res = await fetch(`${API}/api/paypal/create-order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ package: pkg, amount })
    });
    const data = await res.json();
    if (data.orderID) {
        window.location.href = `https://www.sandbox.paypal.com/checkoutnow?token=${data.orderID}`;
    } else {
        alert('失败: ' + (data.error || '未知错误'));
    }
}
load();
</script>
</body>
</html>
