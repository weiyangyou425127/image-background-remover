<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Image Background Remover</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }

        .navbar {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand { font-weight: 700; font-size: 16px; color: #333; text-decoration: none; }
        .navbar-brand span { color: #6c63ff; }
        .navbar-user { display: flex; align-items: center; gap: 10px; }
        .navbar-user img { width: 32px; height: 32px; border-radius: 50%; }
        .navbar-user span { font-size: 14px; color: #555; }
        .btn-back { padding: 6px 14px; background: #6c63ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; }

        .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }

        .user-card {
            background: linear-gradient(135deg, #6c63ff 0%, #8b5cf6 100%);
            border-radius: 16px;
            padding: 28px 32px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .user-card img { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); }
        .user-card-info h2 { font-size: 20px; font-weight: 700; }
        .user-card-info p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .user-card-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #6c63ff; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
        .stat-card .sub { font-size: 12px; color: #bbb; margin-top: 2px; }

        .section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .credit-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .credit-row:last-child { border-bottom: none; }
        .credit-row .name { font-size: 14px; color: #555; }
        .credit-row .value { font-size: 14px; font-weight: 600; color: #333; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
        .tag-free { background: #e8f5e9; color: #2e7d32; }
        .tag-paid { background: #e3f2fd; color: #1565c0; }
        .tag-sub { background: #f3e5f5; color: #6a1b9a; }

        .progress-wrap { margin-top: 6px; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #8b5cf6); border-radius: 3px; }
        .progress-label { font-size: 12px; color: #aaa; margin-top: 4px; }

        .buy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .buy-card {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .buy-card:hover { border-color: #6c63ff; background: #faf9ff; }
        .buy-card.popular { border-color: #6c63ff; }
        .buy-card.popular::before {
            content: '🔥 推荐';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            background: #6c63ff;
            color: #fff;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .buy-card .price { font-size: 22px; font-weight: 700; color: #6c63ff; }
        .buy-card .credits { font-size: 13px; color: #555; margin-top: 4px; }
        .buy-card .per { font-size: 11px; color: #aaa; margin-top: 2px; }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 13px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .time { color: #aaa; font-size: 12px; }
        .source-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .source-free { background: #e8f5e9; color: #2e7d32; }
        .source-paid { background: #e3f2fd; color: #1565c0; }
        .source-subscription { background: #f3e5f5; color: #6a1b9a; }

        .empty { text-align: center; color: #ccc; padding: 32px 0; font-size: 14px; }

        .btn-primary { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-primary:hover { background: #5a52e0; }
        .btn-danger { background: transparent; color: #e53935; border: 1.5px solid #e53935; border-radius: 8px; padding: 9px 16px; cursor: pointer; font-size: 13px; }

        .loading-spinner { text-align: center; padding: 80px; color: #aaa; font-size: 15px; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .buy-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">Image <span>BG</span> Remover</a>
    <div class="navbar-user">
        <img id="navAvatar" src="" alt="" style="display:none">
        <span id="navName"></span>
        <a href="/" class="btn-back">← 去处理图片</a>
    </div>
</nav>

<div class="container" id="mainContent">
    <div class="loading-spinner">⏳ 加载中...</div>
</div>

<script>
const AUTH_API = 'https://image-bg-auth.weiyangyou425127.workers.dev';

async function loadDashboard() {
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/'; return; }

    try {
        const [meRes, statsRes] = await Promise.all([
            fetch(`${AUTH_API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } }),
            fetch(`${AUTH_API}/api/user/stats`, { headers: { Authorization: `Bearer ${token}` } }),
        ]);

        if (!meRes.ok) {
            localStorage.removeItem('auth_token');
            window.location.href = '/';
            return;
        }

        const user = await meRes.json();
        const stats = statsRes.ok ? await statsRes.json() : { processing_history: [], transaction_history: [] };
        renderDashboard(user, stats);
    } catch(e) {
        document.getElementById('mainContent').innerHTML = '<div class="loading-spinner">加载失败，请刷新重试</div>';
    }
}

function renderDashboard(user, stats) {
    const navAvatar = document.getElementById('navAvatar');
    navAvatar.src = user.picture || '';
    navAvatar.style.display = 'block';
    document.getElementById('navName').textContent = user.name;

    const sub = user.subscription;
    const planLabel = { free: '免费版', basic: 'Basic', pro: 'Pro ✨', business: 'Business 🚀' }[sub.plan] || '免费版';

    // 订阅进度条
    let subProgressHtml = '';
    if (sub.plan !== 'free' && sub.monthly_quota > 0) {
        const pct = Math.min(100, Math.round((sub.monthly_used / sub.monthly_quota) * 100));
        const resetDate = sub.period_end ? new Date(sub.period_end).toLocaleDateString('zh-CN') : '-';
        subProgressHtml = `
        <div class="credit-row">
            <div style="flex:1">
                <div class="name">订阅额度 <span class="tag tag-sub">${planLabel}</span></div>
                <div class="progress-wrap">
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <div class="progress-label">${sub.monthly_used} / ${sub.monthly_quota} 张 · 重置于 ${resetDate}</div>
                </div>
            </div>
            <div class="value" style="margin-left:16px">${sub.monthly_quota - sub.monthly_used} 张剩余</div>
        </div>`;
    }

    // 处理历史
    const sourceMap = {
        free: ['免费额度', 'source-free'],
        paid: ['付费积分', 'source-paid'],
        subscription: ['订阅额度', 'source-subscription'],
    };
    const historyHtml = stats.processing_history.length === 0
        ? '<div class="empty">暂无处理记录</div>'
        : stats.processing_history.map(job => {
            const [label, cls] = sourceMap[job.credit_source] || ['未知', ''];
            const d = new Date(job.created_at);
            const time = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            return `<div class="history-item">
                <span>🖼️ 去背景处理</span>
                <span class="source-badge ${cls}">${label}</span>
                <span class="time">${time}</span>
            </div>`;
        }).join('');

    document.getElementById('mainContent').innerHTML = `
        <div class="user-card">
            <img src="${escHtml(user.picture || '')}" alt="头像">
            <div class="user-card-info">
                <h2>${escHtml(user.name)}</h2>
                <p>${escHtml(user.email)}</p>
            </div>
            <div class="user-card-badge">${planLabel}</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="num">${user.free_credits}</div>
                <div class="label">免费额度</div>
                <div class="sub">张</div>
            </div>
            <div class="stat-card">
                <div class="num">${user.paid_credits}</div>
                <div class="label">付费积分</div>
                <div class="sub">永不过期</div>
            </div>
            <div class="stat-card">
                <div class="num">${user.total_processed}</div>
                <div class="label">累计处理</div>
                <div class="sub">张图片</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">💳 额度详情</div>
            ${subProgressHtml}
            <div class="credit-row">
                <div class="name">免费额度 <span class="tag tag-free">每月重置</span></div>
                <div class="value">${user.free_credits} 张</div>
            </div>
            <div class="credit-row">
                <div class="name">付费积分 <span class="tag tag-paid">永不过期</span></div>
                <div class="value">${user.paid_credits} 张</div>
            </div>
            <div class="credit-row">
                <div class="name" style="font-weight:600">总可用额度</div>
                <div class="value" style="color:#6c63ff;font-size:16px">${user.total_available} 张</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🛒 购买积分包（永不过期）</div>
            <div class="buy-grid">
                <div class="buy-card">
                    <div class="price">$3.9</div>
                    <div class="credits">10 张</div>
                    <div class="per">$0.39 / 张</div>
                </div>
                <div class="buy-card popular">
                    <div class="price">$14.9</div>
                    <div class="credits">50 张</div>
                    <div class="per">$0.30 / 张</div>
                </div>
                <div class="buy-card">
                    <div class="price">$49.9</div>
                    <div class="credits">200 张</div>
                    <div class="per">$0.25 / 张</div>
                </div>
            </div>
            <p style="font-size:12px;color:#bbb;margin-top:14px;text-align:center">💳 支付功能即将上线，敬请期待</p>
        </div>

        <div class="section">
            <div class="section-title">📋 处理记录</div>
            <div>${historyHtml}</div>
        </div>

        <div class="section">
            <div class="section-title">⚙️ 账户</div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
                <a href="/" class="btn-primary">去处理图片</a>
                <button class="btn-danger" onclick="logout()">退出登录</button>
            </div>
        </div>
    `;
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function logout() {
    localStorage.removeItem('auth_token');
    window.location.href = '/';
}

loadDashboard();
</script>
</body>
</html>
