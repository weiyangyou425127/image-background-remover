<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片去背景工具 - Image Background Remover</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 登录相关样式 */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 12px 0 0 0;
            margin-bottom: 8px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-name {
            font-size: 14px;
            color: #555;
        }
        .btn-login {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            text-decoration: none;
            transition: box-shadow 0.2s;
        }
        .btn-login:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .btn-login svg {
            width: 18px;
            height: 18px;
        }
        .btn-logout {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #888;
        }
        .btn-logout:hover { color: #333; border-color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部登录区 -->
        <div class="header">
            <div id="authArea">
                <!-- 未登录：显示登录按钮 -->
                <a href="https://image-bg-auth.weiyangyou425127.workers.dev/api/auth/google" class="btn-login" id="loginBtn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    使用 Google 登录
                </a>
                <!-- 已登录：显示用户信息 -->
                <div class="user-info" id="userInfo" style="display:none;">
                    <img class="user-avatar" id="userAvatar" src="" alt="头像">
                    <span class="user-name" id="userName"></span>
                    <button class="btn-logout" id="logoutBtn">退出</button>
                </div>
            </div>
        </div>

        <h1>🖼️ 图片去背景工具</h1>
        <p class="subtitle">AI 智能去除图片背景，支持透明 PNG 导出</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/jpg,image/jpeg,image/png,image/webp" hidden>
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p>点击或拖拽图片到这里</p>
                <span>支持 JPG、PNG、WebP 格式，最大 12MB</span>
            </div>
        </div>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>AI 正在处理中，请稍候...</p>
        </div>

        <div class="preview-area" id="previewArea" style="display:none;">
            <div class="preview-box">
                <h3>原图</h3>
                <img id="originalImage" alt="原图">
            </div>
            <div class="preview-box">
                <h3>去背景后</h3>
                <div class="result-wrapper">
                    <img id="resultImage" alt="去背景后">
                </div>
            </div>
        </div>

        <div class="actions" id="actions" style="display:none;">
            <button id="downloadBtn" class="btn-primary">⬇️ 下载透明PNG</button>
            <button id="resetBtn" class="btn-secondary">🔄 重新上传</button>
        </div>

        <div class="error" id="error" style="display:none;">
            <p id="errorMsg"></p>
        </div>

        <div class="footer">
            <p>由 <a href="https://www.remove.bg" target="_blank">remove.bg</a> AI 技术驱动</p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // ===== Google OAuth 登录逻辑 =====
        const AUTH_API = 'https://image-bg-auth.weiyangyou425127.workers.dev';

        async function checkAuth() {
            const token = localStorage.getItem('auth_token');
            if (!token) return;

            try {
                const res = await fetch(`${AUTH_API}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    showUserInfo(user);
                } else {
                    localStorage.removeItem('auth_token');
                }
            } catch (e) {
                console.error('Auth check failed', e);
            }
        }

        function showUserInfo(user) {
            document.getElementById('loginBtn').style.display = 'none';
            const userInfo = document.getElementById('userInfo');
            userInfo.style.display = 'flex';
            document.getElementById('userAvatar').src = user.picture || '';
            document.getElementById('userName').textContent = user.name || user.email;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('auth_token');
            document.getElementById('loginBtn').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
        });

        // 检查 URL 是否携带 token（OAuth 回调后）
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            localStorage.setItem('auth_token', tokenFromUrl);
            // 清除 URL 中的 token 参数
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
