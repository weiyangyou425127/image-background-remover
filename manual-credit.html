<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>手动添加积分</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #6c63ff; color: #fff; border: none; cursor: pointer; }
        button:hover { background: #5a52e0; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="form">
        <h2>手动添加积分</h2>
        <p>输入 PayPal 订单 ID 来手动添加积分</p>
        <input type="text" id="orderId" placeholder="订单 ID (例如: 98K31065Y1322153R)">
        <button onclick="addCredits()">添加积分</button>
        <div id="result"></div>
    </div>
    <script>
    const API = 'https://image-bg-auth.weiyangyou425127.workers.dev';
    async function addCredits() {
        const orderId = document.getElementById('orderId').value.trim();
        if (!orderId) { alert('请输入订单 ID'); return; }
        const token = localStorage.getItem('auth_token');
        if (!token) { alert('请先登录'); window.location.href = '/'; return; }
        try {
            const res = await fetch(`${API}/api/paypal/capture-order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ orderID: orderId })
            });
            const data = await res.json();
            const result = document.getElementById('result');
            if (res.ok) {
                result.className = 'result success';
                result.textContent = '✅ 积分添加成功！请返回个人中心查看。';
            } else {
                result.className = 'result error';
                result.textContent = '❌ 失败: ' + (data.error || '未知错误');
            }
        } catch(e) {
            document.getElementById('result').className = 'result error';
            document.getElementById('result').textContent = '❌ 错误: ' + e.message;
        }
    }
    </script>
</body>
</html>
