<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Image Background Remover</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
        .navbar { background: #fff; border-bottom: 1px solid #eee; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .navbar-brand { font-weight: 700; font-size: 16px; color: #333; text-decoration: none; }
        .navbar-brand span { color: #6c63ff; }
        .btn-back { padding: 6px 14px; background: #6c63ff; color: #fff; border: none; border-radius: 6px; font-size: 13px; text-decoration: none; }
        .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
        .user-card { background: linear-gradient(135deg, #6c63ff 0%, #8b5cf6 100%); border-radius: 16px; padding: 28px 32px; color: #fff; display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
        .user-card img { width: 64px; height: 64px; border-radius: 50%; }
        .user-card-info h2 { font-size: 20px; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #6c63ff; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
        .section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
        .buy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .buy-card { border: 2px solid #eee; border-radius: 10px; padding: 16px; text-align: center; }
        .buy-card .price { font-size: 22px; font-weight: 700; color: #6c63ff; }
        .buy-card .credits { font-size: 13px; color: #555; margin-top: 4px; }
        .buy-btn { margin-top: 12px; padding: 10px 20px; background: #0070ba; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; }
        .buy-btn:hover { background: #005ea6; }
        .btn-danger { background: transparent; color: #e53935; border: 1.5px solid #e53935; border-radius: 8px; padding: 9px 16px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">Image <span>BG Remover</span></a>
    <a href="/" class="btn-back">← 返回首页</a>
</nav>
<div class="container"><div id="content">加载中...</div></div>
<script src="https://www.paypal.com/sdk/js?client-id=Aeajzmpx8jJqRSS2iC-0MS4HaFP4_WkRUzUW_wjHgVr0L2_KUHLFOHMVAnPdDCbH5_ELsk7CNCGyL_-g&currency=USD"></script>
<script>
const AUTH_API = 'https://image-bg-auth.weiyangyou425127.workers.dev';
let currentUser = null;

async function loadDashboard() {
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/'; return; }
    try {
        const res = await fetch(`${AUTH_API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Auth failed');
        currentUser = await res.json();
        renderDashboard();
    } catch(e) {
        localStorage.removeItem('auth_token');
        window.location.href = '/';
    }
}

function renderDashboard() {
    document.getElementById('content').innerHTML = `
        <div class="user-card">
            <img src="${currentUser.picture}">
            <div class="user-card-info"><h2>${currentUser.name}</h2><p>${currentUser.email}</p></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="num">${currentUser.total_available}</div><div class="label">总可用额度</div></div>
            <div class="stat-card"><div class="num">${currentUser.paid_credits}</div><div class="label">付费积分</div></div>
            <div class="stat-card"><div class="num">${currentUser.total_processed}</div><div class="label">累计处理</div></div>
        </div>
        <div class="section">
            <div class="section-title">🛒 购买积分包</div>
            <div class="buy-grid">
                <div class="buy-card">
                    <div class="price">$3.9</div>
                    <div class="credits">10 张</div>
                    <button class="buy-btn" onclick="buyPackage('credits_10', '3.90', 10)">PayPal 购买</button>
                </div>
                <div class="buy-card">
                    <div class="price">$14.9</div>
                    <div class="credits">50 张</div>
                    <button class="buy-btn" onclick="buyPackage('credits_50', '14.90', 50)">PayPal 购买</button>
                </div>
                <div class="buy-card">
                    <div class="price">$49.9</div>
                    <div class="credits">200 张</div>
                    <button class="buy-btn" onclick="buyPackage('credits_200', '49.90', 200)">PayPal 购买</button>
                </div>
            </div>
        </div>
        <div class="section"><button class="btn-danger" onclick="logout()">退出登录</button></div>
    `;
}

async function buyPackage(pkg, amount, credits) {
    try {
        const token = localStorage.getItem('auth_token');
        const res = await fetch(`${AUTH_API}/api/paypal/create-order`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ package: pkg, amount })
        });
        const data = await res.json();
        if (!data.orderID) throw new Error(data.error || 'Failed to create order');
        
        // 跳转到 PayPal 支付页面
        window.location.href = `https://www.sandbox.paypal.com/checkoutnow?token=${data.orderID}`;
    } catch(e) {
        alert('创建订单失败: ' + e.message);
    }
}

function logout() {
    localStorage.removeItem('auth_token');
    window.location.href = '/';
}

loadDashboard();
</script>
</body>
</html>
